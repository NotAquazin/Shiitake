<!DOCTYPE html>
<html>
<head>
    <title>Shiitake CR List</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .cr-card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); }
        .tag { background: #003366; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Ateneo CR Navigator</h1>
    <div id="cr-list">Loading restrooms...</div>

    <script>
        // Fetch data from our Node.js API
        fetch('/api/crs')
            .then(res => res.json())
            .then(data => {
                const listDiv = document.getElementById('cr-list');
                listDiv.innerHTML = '';

                data.forEach(cr => {
                    // Create the HTML for the reviews
                    const reviewsHTML = cr.Reviews.map(rev => `
                        <div style="font-size: 0.9em; color: #555; border-left: 3px solid #003366; padding-left: 10px; margin-top: 5px;">
                            <strong>Rating: ${rev.rating}/5</strong><br>
                            "${rev.comment}"
                        </div>
                    `).join('');

                    const card = `
                        <div class="cr-card">
                            <h3>${cr.name}</h3>
                            <p>Building: ${cr.building}</p>
                            <div>${cr.tags.map(t => `<span class="tag">${t}</span>`).join(' ')}</div>
                            
                            <h4>Reviews:</h4>
                            ${reviewsHTML || '<p>No reviews yet.</p>'}
                        </div>
                    `;
                    listDiv.innerHTML += card;
                });
            });
    </script>
</body>
</html>
