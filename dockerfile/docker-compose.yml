version: "3"
services:
  db:
    image: postgres
    environment:
      POSTGRES_PASSWORD: password123
      POSTGRES_USER: user123
      POSTGRES_DB: database123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user123 -d database123"]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    # app name
    image: shiitake
    # portmapping, 3000 port but 1337 is local
    ports: 
      - 13000:3000
    depends_on:
      db:
        condition: service_healthy